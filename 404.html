<head>

<title>DOJO OS</title>
<style>
  html,body{margin:0;background:#090909;color:#c9a84c;font-family:monospace;
    display:flex;align-items:center;justify-content:center;height:100vh;text-align:center}
  a{color:#c9a84c}
</style>
<script>
  // Redirect any 404 back to the app
  var path = window.location.pathname;
  var repo = path.split('/')[1];
  if (repo && !repo.includes('.')) {
    window.location.replace('/' + repo + '/dojo_os_v1.html');
  } else {
    window.location.replace('./dojo_os_v1.html');
  }
</script>
</head>
<body>
<div>
  <div style="font-size:48px;margin-bottom:12px">🥋</div>
  <div style="font-size:24px;letter-spacing:8px;margin-bottom:8px">DOJO OS</div>
  <div style="font-size:11px;color:#505050;letter-spacing:2px">
    Redirecting… <a href="./dojo_os_v1.html">click here if not redirected</a>
  </div>
</div>
</body>
</html>
